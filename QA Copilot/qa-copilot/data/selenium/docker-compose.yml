# =============================================================================
# Docker Compose for Selenoid Grid
# Scalable browser grid for parallel test execution
# =============================================================================
# 
# Usage:
#   1. Start Selenoid Grid:    docker-compose up -d
#   2. View Selenoid UI:       http://localhost:8080
#   3. Run tests:              mvn test -Dexecution_mode=remote -Dremote_url=http://localhost:4444/wd/hub
#   4. Stop Selenoid Grid:     docker-compose down
#
# =============================================================================

version: '3.8'

services:
  # ===========================================
  # Selenoid - Browser Grid Manager
  # ===========================================
  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: selenoid
    ports:
      - "4444:4444"
    volumes:
      - "./selenoid:/etc/selenoid"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./selenoid/video:/opt/selenoid/video"
      - "./selenoid/logs:/opt/selenoid/logs"
    environment:
      - OVERRIDE_VIDEO_OUTPUT_DIR=$PWD/selenoid/video
    command: [
      "-conf", "/etc/selenoid/browsers.json",
      "-video-output-dir", "/opt/selenoid/video",
      "-log-output-dir", "/opt/selenoid/logs",
      "-container-network", "selenoid_network",
      "-limit", "10",
      "-timeout", "3m",
      "-service-startup-timeout", "2m"
    ]
    networks:
      - selenoid_network

  # ===========================================
  # Selenoid UI - Visual Dashboard
  # ===========================================
  selenoid-ui:
    image: aerokube/selenoid-ui:latest-release
    container_name: selenoid-ui
    ports:
      - "8080:8080"
    command: ["--selenoid-uri", "http://selenoid:4444"]
    depends_on:
      - selenoid
    networks:
      - selenoid_network

  # ===========================================
  # GGR (Go Grid Router) - Load Balancer (Optional)
  # Uncomment for multi-host grid setup
  # ===========================================
  # ggr:
  #   image: aerokube/ggr:latest-release
  #   container_name: ggr
  #   ports:
  #     - "4445:4444"
  #   volumes:
  #     - "./ggr:/etc/grid-router:ro"
  #   networks:
  #     - selenoid_network

networks:
  selenoid_network:
    driver: bridge
    name: selenoid_network

